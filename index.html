  }

  /* ── GAME CONTAINER ── */
  #game-container {
    position: relative;
    width: min(520px, 100%);
    height: 460px;
    overflow: hidden;
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: default;
    user-select: none;
    box-shadow: 0 0 60px rgba(231,76,123,0.08);
  }

  /* floating hearts bg */
  #game-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(231,76,123,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(110,198,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #shirt {
    position: absolute;
    font-size: 52px;
    cursor: pointer;
    transition: transform 0.08s;
    filter: drop-shadow(0 2px 8px rgba(231,76,123,0.3));
    z-index: 10;
  }
  #shirt:active { transform: scale(0.82); }

  #click-counter {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    z-index: 20;
    background: rgba(255,255,255,0.05);
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  /* heart progress bar */
  #hearts-row {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90%;
    z-index: 20;
  }
  .heart-pip {
    font-size: 16px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    filter: grayscale(1) brightness(0.4);
  }
  .heart-pip.lit {
    filter: grayscale(0) brightness(1);
    animation: heartPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes heartPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }

  #speech-bubble {
    position: absolute;
    background: rgba(26,26,36,0.92);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    max-width: 200px;
    text-align: center;
    transition: opacity 0.2s;
    backdrop-filter: blur(6px);
  }

  /* ── END OVERLAY ── */
  #explosion-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 50;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
  }

  /* tombstone card replaced with photo card */
  #end-card {
    text-align: center;
    animation: popIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  @keyframes popIn {
    0% { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* RIP photo frame */
  #rip-frame {
    position: relative;
    width: 220px;
    border-radius: 16px;
    border: 3px solid rgba(231,76,123,0.6);
    box-shadow: 0 0 40px rgba(231,76,123,0.35), 0 0 0 1px rgba(255,255,255,0.08);
  }
  #rip-frame img {
    width: 100%;
    display: block;
    filter: grayscale(0.2) contrast(1.05);
    object-fit: contain;
  }
  #rip-badge {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(231,76,123,0.85);
    color: #fff;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.2em;
    padding: 3px 14px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  #name-plate {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 24px;
    line-height: 1.6;
  }
  #name-plate h2 {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    margin: 0 0 2px;
  }
  #name-plate p {
    font-size: 12px;
    color: var(--text-sub);
  }
  #name-plate .years {
    font-style: italic;
    margin-top: 4px;
    font-size: 11px;
    color: rgba(240,240,245,0.35);
  }

  #sorry-msg {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    animation: fadeUp 0.6s 0.4s both;
  }
  #sorry-sub {
    font-size: 12px;
    color: var(--text-sub);
    animation: fadeUp 0.6s 0.8s both;
    max-width: 260px;
    line-height: 1.5;
    text-align: center;
  }
  #restart-btn {
    margin-top: 4px;
    padding: 9px 24px;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 20px;
    animation: fadeUp 0.6s 1s both;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(231,76,123,0.4);
  }
  #restart-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(231,76,123,0.55); }
  #love-msg {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    line-height: 1.5;
    animation: fadeUp 0.8s 1.2s both;
    text-shadow: 0 0 30px rgba(231,76,123,0.8), 0 0 60px rgba(231,76,123,0.4);
    letter-spacing: 0.01em;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* confetti */
  .confetti-piece {
    position: absolute;
    border-radius: 2px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 40;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(480px) rotate(720deg); opacity: 0; }
  }

  /* hit flash */
  .hit-flash {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: hitAnim 0.5s ease-out forwards;
    z-index: 30;
  }
  @keyframes hitAnim {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2) translateY(-24px); opacity: 0; }
  }

  /* caption */
  #caption {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-sub);
    text-align: center;
    max-width: 420px;
  }

  /* floating hearts decoration */
  .float-heart {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    animation: floatHeart linear infinite;
    opacity: 0;
    z-index: 1;
  }
  @keyframes floatHeart {
    0% { opacity: 0; transform: translateY(0) scale(0.8); }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-420px) scale(1.2); }
  }
</style>
</head>

<p id="caption">Klick 30× auf das Hemd um die volle Wahrheit zu enthüllen</p>

<script>
const TOTAL = 30;

const sayings = [
  "I fucked up",
  "Oh oh",
  "Ciao ciao",
  "Catch me Bitch",
  "Ich mag Seoul aber dich meh ;)",
  "dicki finger",
  "bravo so schnell, da wirsch nit blitzt sondern gmalt..",
  "Valerio!!! 😤",
  "Ich versteck mich!",
  "wird ja immer wie schneller, huh ^^",
  "guet gmacht fuultier",
  "💙",
  "bitte bring mi nit um",
];

let clicks = 0;
let animFrame;
let vx = 2.8, vy = 1.8;
let sx, sy;
let container, shirt, bubble, counter, overlay, heartsRow;
let bubbleTimeout;
let usedSayings = [];

// build heart pips
function buildHearts() {
  heartsRow.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const h = document.createElement('span');
    h.className = 'heart-pip';
    h.textContent = '❤️';
    h.id = 'h' + i;
    heartsRow.appendChild(h);
  }
}

function lightHeart(n) {
  const el = document.getElementById('h' + (n - 1));
  if (el) el.classList.add('lit');
}

function getNextSaying() {
  if (usedSayings.length >= sayings.length) usedSayings = [];
  const remaining = sayings.filter((_, i) => !usedSayings.includes(i));
  const idx = sayings.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
  usedSayings.push(idx);
  return sayings[idx];
}

function spawnFloatingHeart() {
  const h = document.createElement('div');
  h.className = 'float-heart';
  h.textContent = ['❤️','🩷','💙','💜','🤍'][Math.floor(Math.random()*5)];
  const cw = container.offsetWidth;
  h.style.left = (Math.random() * (cw - 30)) + 'px';
  h.style.bottom = '40px';
  h.style.animationDuration = (4 + Math.random() * 4) + 's';
  h.style.animationDelay = (Math.random() * 1) + 's';
  container.appendChild(h);
  setTimeout(() => h.remove(), 9000);
}

function init() {
  container = document.getElementById('game-container');
  shirt = document.getElementById('shirt');
  bubble = document.getElementById('speech-bubble');
  counter = document.getElementById('click-counter');
  overlay = document.getElementById('explosion-overlay');
  heartsRow = document.getElementById('hearts-row');

  buildHearts();

  const cw = container.offsetWidth;
  const ch = container.offsetHeight;
  sx = Math.random() * (cw - 70) + 10;
  sy = Math.random() * ((container.offsetHeight / 2) - 64) + 10;
  shirt.style.left = sx + 'px';
  shirt.style.top = sy + 'px';

  shirt.addEventListener('click', onShirtClick);
  startMoving();

  // ambient floating hearts
  setInterval(spawnFloatingHeart, 2500);
}

function startMoving() {
  function move() {
    const cw = container.offsetWidth - 64;
    const ch = (container.offsetHeight / 2) - 64;
    sx += vx;
    sy += vy;
    if (sx <= 0) { sx = 0; vx = Math.abs(vx) + Math.random() * 0.4; }
    if (sx >= cw) { sx = cw; vx = -(Math.abs(vx) + Math.random() * 0.4); }
    if (sy <= 0) { sy = 0; vy = Math.abs(vy) + Math.random() * 0.4; }
    if (sy >= ch) { sy = ch; vy = -(Math.abs(vy) + Math.random() * 0.4); }
    vx = Math.max(-12, Math.min(12, vx));
    vy = Math.max(-12, Math.min(12, vy));
    shirt.style.left = sx + 'px';
    shirt.style.top = sy + 'px';
    animFrame = requestAnimationFrame(move);
  }
  animFrame = requestAnimationFrame(move);
}

function onShirtClick(e) {
  e.stopPropagation();
  clicks++;
  counter.textContent = clicks + ' / ' + TOTAL + ' Treffer ❤️';
  lightHeart(clicks);

  const speed = 1 + clicks * 0.22;
  vx = (Math.random() > 0.5 ? 1 : -1) * (3.0 + Math.random() * speed);
  vy = (Math.random() > 0.5 ? 1 : -1) * (2.2 + Math.random() * speed);

  const flash = document.createElement('div');
  flash.className = 'hit-flash';
  flash.textContent = ['💥','⚡','✨','👊','😤','❤️'][Math.floor(Math.random() * 6)];
  flash.style.left = (sx + 20) + 'px';
  flash.style.top = (sy - 10) + 'px';
  container.appendChild(flash);
  setTimeout(() => flash.remove(), 500);

  const saying = getNextSaying();
  bubble.textContent = saying;
  const bx = Math.min(sx + 65, container.offsetWidth - 210);
  bubble.style.left = Math.max(4, bx) + 'px';
  bubble.style.top = Math.max(44, sy - 10) + 'px';
  bubble.style.opacity = '1';
  clearTimeout(bubbleTimeout);
  bubbleTimeout = setTimeout(() => bubble.style.opacity = '0', 1200);

  if (clicks >= TOTAL) {
    setTimeout(triggerExplosion, 200);
  }
}

function triggerExplosion() {
  cancelAnimationFrame(animFrame);
  shirt.style.display = 'none';
  bubble.style.display = 'none';

  const colors = ['#e74c7b','#6ec6ff','#1D9E75','#EF9F27','#ff80ab','#7F77DD','#ff6b6b'];
  const cw = container.offsetWidth;

  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    if (Math.random() > 0.4) {
      c.textContent = '❤️';
      c.style.background = 'transparent';
      c.style.fontSize = (10 + Math.random() * 16) + 'px';
    } else {
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 10) + 'px';
      c.style.height = (6 + Math.random() * 10) + 'px';
    }
    c.style.left = (Math.random() * cw) + 'px';
    c.style.top = (Math.random() * 80) + 'px';
    c.style.animationDuration = (1.8 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.8) + 's';
    container.appendChild(c);
  }

  overlay.style.display = 'flex';
}

function restartGame() {
  clicks = 0;
  usedSayings = [];
  counter.textContent = '0 / ' + TOTAL + ' Treffer ❤️';
  overlay.style.display = 'none';
  shirt.style.display = 'block';
  bubble.style.display = 'block';
  bubble.style.opacity = '0';

  buildHearts();
  container.querySelectorAll('.confetti-piece').forEach(c => c.remove());

  const cw = container.offsetWidth;
  const ch = container.offsetHeight;
  sx = Math.random() * (cw - 70) + 10;
  sy = Math.random() * ((container.offsetHeight / 2) - 64) + 10;
  vx = 2.8; vy = 1.8;
  startMoving();
}

window.restartGame = restartGame;
setTimeout(init, 100);
</script>
